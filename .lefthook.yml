# lefthook runs locally to enforce the same checks CI runs,
# but staged to the developer's working tree. CI is still the
# source of truth; this is a fast feedback loop.
#
# Install: pnpm install (brings the lefthook binary), then
#          pnpm exec lefthook install

min_version: 2.1.0

pre-commit:
  parallel: true
  commands:
    secrets:
      # Fail the commit if any staged file contains a secret.
      # betterleaks uses its default ruleset (gitleaks-compatible);
      # config lives in .betterleaks.toml or config/betterleaks.toml
      # (per-repo overrides) if needed.
      run: betterleaks git . --pre-commit --staged --no-banner --redact --exit-code=2

    format:
      # Prettier check on staged files only — fast.
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,md,yml,yaml}"
      run: pnpm exec prettier --check {staged_files}

    typecheck:
      # Skip typecheck if no TS files are staged.
      glob: "*.{ts,tsx}"
      run: pnpm typecheck

pre-push:
  parallel: false
  commands:
    validate:
      # The full fast gate: lint, format:check, typecheck, test, build, audit.
      # Fails the push.
      run: pnpm validate
