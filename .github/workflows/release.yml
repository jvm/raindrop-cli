name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  security-events: write

jobs:
  security:
    uses: ./.github/workflows/security.yml

  release:
    needs: security
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: "package.json"

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: pnpm validate

      - name: Verify package contents
        run: pnpm verify-pack

      - name: Pack
        run: pnpm pack

      - name: Compute checksums
        run: shasum -a 256 -- ./*.tgz > checksums.txt

      # npm trusted publishing uses GitHub OIDC via `permissions: id-token: write`.
      # Configure npmjs.com Trusted Publisher for this package with:
      #   owner/repo: jvm/raindrop-cli
      #   workflow filename: release.yml
      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            *.tgz
            checksums.txt
