name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
        with:
          version: 11.0.6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm verify-pack
      - run: pnpm audit --audit-level moderate
      - run: pnpm audit signatures

  # Secret-scan + SAST. Implemented as a reusable workflow so the
  # same scanner suite also gates the release. Any finding fails
  # the job, which blocks merge.
  security:
    uses: ./.github/workflows/security.yml
    with:
      upload-artifact: true
