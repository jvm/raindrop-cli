name: Bug report
description: Report a reproducible problem with raindrop
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include live Raindrop tokens, refresh tokens, client secrets, or Authorization headers.
  - type: input
    id: version
    attributes:
      label: CLI version
      description: Output of `raindrop --version`.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: v20.11.0
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command, with secrets removed.
      render: bash
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include structured JSON error output if available. Remove secrets first.
      render: json
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: raindrop doctor output
      description: Paste relevant output from `raindrop doctor`, with secrets removed.
      render: json
  - type: textarea
    id: context
    attributes:
      label: Additional context
